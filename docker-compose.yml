services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: energychief
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: energychief
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energychief"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://energychief:${POSTGRES_PASSWORD}@db:5432/energychief
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
      ENODE_WEBHOOK_SECRET: ${ENODE_WEBHOOK_SECRET}
      ENODE_CLIENT_ID: ${ENODE_CLIENT_ID}
      ENODE_CLIENT_SECRET: ${ENODE_CLIENT_SECRET}
      ENODE_API_URL: ${ENODE_API_URL}
      TELEGRAM_REDIRECT_URI: ${TELEGRAM_REDIRECT_URI}

volumes:
  pgdata: